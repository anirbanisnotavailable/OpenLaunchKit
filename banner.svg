<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070A10" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg-grad)" />

  <circle cx="1000" cy="100" r="150" fill="#A855F7" opacity="0.15" filter="url(#glow)" />
  <circle cx="200" cy="500" r="200" fill="#6366F1" opacity="0.1" filter="url(#glow)" />

  <g transform="translate(100, 240)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="76" fill="#FFFFFF" letter-spacing="-1">
      OpenLaunchKit <tspan fill="url(#accent-grad)">🚀</tspan>
    </text>
    
    <text x="0" y="55" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="24" fill="#9CA3AF" letter-spacing="0.5">
      The Zero-Cost Launchpad for Indie Developers
    </text>

    <g transform="translate(0, 110)">
      <rect x="0" y="0" width="110" height="32" rx="16" fill="#1F2937" stroke="#374151" stroke-width="1"/>
      <text x="55" y="20" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#F3F4F6" text-anchor="middle">OFFLINE AI</text>

      <rect x="125" y="0" width="130" height="32" rx="16" fill="#1F2937" stroke="#374151" stroke-width="1"/>
      <text x="190" y="20" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#F3F4F6" text-anchor="middle">ASSET ENGINE</text>

      <rect x="265" y="0" width="95" height="32" rx="16" fill="#065F46" stroke="#047857" stroke-width="1"/>
      <text x="312" y="20" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#34D399" text-anchor="middle">100% FREE</text>
    </g>
  </g>

  <g transform="translate(750, 120)">
    <rect x="0" y="0" width="320" height="420" rx="40" fill="#151E31" stroke="#374151" stroke-width="4" filter="drop-shadow(0 25px 25px rgba(0,0,0,0.5))"/>
    <rect x="15" y="15" width="290" height="390" rx="28" fill="#1E293B" />
    
    <rect x="35" y="45" width="220" height="28" rx="6" fill="#334155" />
    <circle cx="230" cy="59" r="6" fill="#A855F7" />
    
    <rect x="35" y="95" width="140" height="16" rx="4" fill="#475569" />
    <rect x="35" y="125" width="220" height="100" rx="12" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    
    <path d="M 55 195 Q 105 155 145 175 T 235 145" fill="none" stroke="url(#accent-grad)" stroke-width="4" stroke-linecap="round"/>
    
    <rect x="35" y="245" width="220" height="45" rx="8" fill="#6366F1" />
    <rect x="95" y="260" width="100" height="14" rx="4" fill="#FFFFFF" />
    
    <rect x="35" y="305" width="220" height="14" rx="4" fill="#334155" />
    <rect x="35" y="330" width="170" height="14" rx="4" fill="#334155" />
  </g>
</svg>
